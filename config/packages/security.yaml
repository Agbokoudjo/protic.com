security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    role_hierarchy:
        # Niveau 0 — Fondateur : hérite de tout
        ROLE_SUPER_ADMIN: 
            - ROLE_FOUNDER

        # Niveau 0 — Fondateur : hérite de tout
        ROLE_FOUNDER: 
            - ROLE_DIRECTOR
            - ROLE_SONATA_ADMIN_USER_ALL 
            - ROLE_SONATA_ADMIN_TEAM_MEMBER_ALL
        # Niveau 1 — Directeur : hérite des 4 pôles + accès Sonata de base
        ROLE_DIRECTOR:  
            - ROLE_EDITORIAL_MGR
            - ROLE_CONTENT_MGR
            - ROLE_MODERATION_MGR
            - ROLE_TECH_MGR
            - ROLE_ADMIN
            - ROLE_SONATA_ADMIN_USER_CREATE,
            - ROLE_SONATA_ADMIN_TEAM_MEMBER_CREATE,
            - ROLE_SONATA_ADMIN_TEAM_MEMBER_EDIT
            - ROLE_SONATA_ADMIN_TEAM_MEMBER_DELETE

        # Niveau 2 — Responsables de pôle
        ROLE_EDITORIAL_MGR:  [ROLE_EDITOR_SENIOR, ROLE_ADMIN]
        ROLE_CONTENT_MGR:    [ROLE_REDACTEUR, ROLE_ADMIN]
        ROLE_MODERATION_MGR: [ROLE_MODERATEUR, ROLE_REVIEWER, ROLE_ADMIN]
        ROLE_TECH_MGR:       [ROLE_DEV, ROLE_ADMIN]

        # Niveau 3 — Agents opérationnels
        ROLE_EDITOR_SENIOR:  [ROLE_EDITOR_JUNIOR, ROLE_ADMIN]
        ROLE_EDITOR_JUNIOR:  [ROLE_ADMIN]
        ROLE_REDACTEUR:      [ROLE_ADMIN]
        ROLE_MODERATEUR:     [ROLE_ADMIN]
        ROLE_REVIEWER:       [ROLE_ADMIN]
        ROLE_DEV:            [ROLE_ADMIN]

        ROLE_ADMIN: 
            - ROLE_SONATA_ADMIN_USER_LIST  
            - ROLE_SONATA_ADMIN_USER_VIEW
            - ROLE_SONATA_ADMIN_USER_EDIT
            - ROLE_SONATA_ADMIN_TEAM_MEMBER_LIST 
            - ROLE_SONATA_ADMIN_TEAM_MEMBER_VIEW 
            
    # https://symfony.com/doc/current/security.html#loading-the-user-the-user-provider
    providers:
        users_in_memory: { memory: null }
        admin_user_provider:
             id: App\Security\Provider\UserProvider
    firewalls:
        dev:
            # Ensure dev tools and static assets are always allowed
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false
        admin:
            context: user
            security: true
            lazy: true
            pattern: /admin(.*)
            provider: admin_user_provider
            login_throttling:
                max_attempts: 3  
            form_login:
                 username_parameter: email
                 password_parameter: password
                 enable_csrf: true
                 login_path: app_admin_user_login
                 check_path: app_admin_user_login
                 default_target_path: sonata_admin_dashboard
            remember_me:
                secret: '%env(APP_SECRET)%'
                lifetime: 604800
                path: /admin
                always_remember_me: true
            logout:
               path: sonata_user_admin_security_logout
               target: app_admin_user_login
        main:
            lazy: true
            provider: users_in_memory
    access_control:
        - { path: ^/admin/form/login$, role: PUBLIC_ACCESS }
    #     - { path: ^/profile, roles: PUBLIC_ACCESS }
        - { path: ^/admin/logout$, role: PUBLIC_ACCESS }
    #     - {path: ^/verify-email/* ,role: PUBLIC_ACCESS }
        - { path: ^/admin/*, roles: ROLE_ADMIN }

when@test:
    security:
        password_hashers:
            # Password hashers are resource-intensive by design to ensure security.
            # In tests, it's safe to reduce their cost to improve performance.
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4 # Lowest possible value for bcrypt
                time_cost: 3 # Lowest possible value for argon
                memory_cost: 10 # Lowest possible value for argon
