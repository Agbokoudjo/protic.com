security:
    # https://symfony.com/doc/current/security.html#registering-the-user-hashing-passwords
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    # https://symfony.com/doc/current/security.html#loading-the-user-the-user-provider
    providers:
        users_in_memory: { memory: null }
        admin_user_provider:
             id: App\Security\Provider\UserProvider
    firewalls:
        dev:
            # Ensure dev tools and static assets are always allowed
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false
        admin:
            context: user
            security: true
            lazy: true
            pattern: /admin(.*)
            provider: admin_user_provider
            login_throttling:
                max_attempts: 3  
            form_login:
                 username_parameter: email
                 password_parameter: password
                 enable_csrf: true
                 login_path: app_admin_user_login
                 check_path: app_admin_user_login
                 default_target_path: sonata_admin_dashboard
            remember_me:
                secret: '%env(APP_SECRET)%'
                lifetime: 604800
                path: /admin
                always_remember_me: true
            logout:
               path: sonata_user_admin_security_logout
               target: app_admin_user_login
        main:
            lazy: true
            provider: users_in_memory
    access_control:
        - { path: ^/admin/form/login$, role: PUBLIC_ACCESS }
    #     - { path: ^/profile, roles: PUBLIC_ACCESS }
        - { path: ^/admin/logout$, role: PUBLIC_ACCESS }
    #     - {path: ^/verify-email/* ,role: PUBLIC_ACCESS }
        - { path: ^/admin/*, roles: ROLE_ADMIN }

when@test:
    security:
        password_hashers:
            # Password hashers are resource-intensive by design to ensure security.
            # In tests, it's safe to reduce their cost to improve performance.
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4 # Lowest possible value for bcrypt
                time_cost: 3 # Lowest possible value for argon
                memory_cost: 10 # Lowest possible value for argon
