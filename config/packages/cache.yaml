framework:
    cache:
        app: cache.adapter.redis
        default_redis_provider: '%env(CACHE_REPOSITORY_REDIS_DSN)%' 

        pools:
            # On crée un pool spécifique qui supporte les tags
            app.rate_limiter:
                adapter: cache.adapter.apcu

            cache.rate_limiter:
                adapter: cache.adapter.redis
                provider: '%env(CACHE_REPOSITORY_REDIS_DSN)%'
                default_lifetime: 3600   # 1h — les fenêtres glissantes sont bien inférieures
                tags: false              # Pas besoin de tags pour le rate limiting
                
            app.cache.taggable:
                adapter: cache.adapter.redis
                provider: '%env(CACHE_REPOSITORY_REDIS_DSN)%'
                tags: true
            doctrine.metadata_cache:
                adapter: cache.adapter.apcu
                default_lifetime: 86400
            doctrine.query_cache:
                adapter: cache.adapter.redis
                default_lifetime: 86400
            doctrine.result_cache:
                adapter: cache.adapter.redis
                provider: '%env(CACHE_REPOSITORY_REDIS_DSN)%' 
                default_lifetime: 86400
                
            session.cache_pool:
                adapter: cache.adapter.redis
                tags: true
                provider: '%env(CACHE_REPOSITORY_REDIS_DSN)%' 
            data.user.provider.cache.pool:
                adapter: cache.adapter.redis_tag_aware #cache.adapter.apcu
                tags: true
                provider: '%env(CACHE_REPOSITORY_REDIS_DSN)%' 
            data.respository.cache:
                adapter: cache.adapter.redis_tag_aware
                provider: '%env(CACHE_REPOSITORY_REDIS_DSN)%' 
                default_lifetime: '%env(CACHE_EXPIRE_AT_REPOSITORY_USER)%'
                tags: true
