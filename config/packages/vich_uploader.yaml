vich_uploader:
    db_driver: orm
    metadata:
        type: attribute
    mappings:
        avatars:
            uri_prefix: /uploads/avatars
            upload_destination: '%kernel.project_dir%/public/uploads/avatars'
            namer: Vich\UploaderBundle\Naming\SmartUniqueNamer
            delete_on_update: true
            delete_on_remove: true

        cover_image_book:
            uri_prefix: /uploads/cover_image_book
            upload_destination: '%kernel.project_dir%/public/uploads/cover_image_book'
            namer: Vich\UploaderBundle\Naming\SmartUniqueNamer
            delete_on_update: true
            delete_on_remove: true

        manuscript_file:
            uri_prefix: /manuscripts
            upload_destination: '%kernel.project_dir%/var/uploads/manuscripts'
            namer: Vich\UploaderBundle\Naming\SmartUniqueNamer
            delete_on_update: true
            delete_on_remove: true
            
        team_photos:
            uri_prefix: /uploads/team
            upload_destination: '%kernel.project_dir%/public/uploads/team'
            namer:
                service: Vich\UploaderBundle\Naming\SmartUniqueNamer
            # Suppression du fichier quand l'entité est supprimée (soft-delete = non déclenché)
            delete_on_remove: true
            delete_on_update: true
            # Optionnel : injection du chemin dans l'entité pour éviter les requêtes supplémentaires
            inject_on_load: false